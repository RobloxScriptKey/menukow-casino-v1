<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MENUKOW CASINO</title>

<style>
body {margin:0;font-family:Arial;background:#0a0e17;color:white;}
header {display:flex;justify-content:space-between;padding:15px;background:#111827;}
.logo {color:#00a2ff;font-weight:bold;}
.balance {color:#00e676;}

.games {display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:15px;}
.card {background:#141a26;padding:20px;border-radius:15px;text-align:center;cursor:pointer;}

#game {padding:20px;}

button {padding:10px;border:none;border-radius:10px;margin:5px;}
input {padding:8px;border-radius:8px;border:none;}

.grid {
display:grid;
grid-template-columns:repeat(5,50px);
gap:5px;
margin-top:10px;
}
.cell {
width:50px;height:50px;
background:#1c2230;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:6px;
}
</style>
</head>

<body>

<header>
<div class="logo">MENUKOW</div>
<div class="balance">💰 <span id="bal">1000</span></div>
</header>

<div class="games">
<div class="card" onclick="openGame('dice')">🎲 Дайс</div>
<div class="card" onclick="openGame('mines')">💣 Мины</div>
<div class="card" onclick="openGame('crash')">🚀 Краш</div>
</div>

<div id="game"></div>

<script>
let balance = 1000;

function updateBal(){
 document.getElementById('bal').innerText = balance;
}

// ===== ДАЙС =====
function diceUI(){
 document.getElementById('game').innerHTML = `
 <h2>🎲 Дайс</h2>
 Ставка <input id="bet"><br>
 Шанс (1-100) <input id="chance"><br>
 <button onclick="playDice()">Играть</button>
 `;
}

function playDice(){
 let bet = Number(document.getElementById('bet').value);
 let chance = Number(document.getElementById('chance').value);

 if(bet > balance) return alert("Нет денег");

 balance -= bet;

 let roll = Math.floor(Math.random()*100)+1;

 alert("Выпало: "+roll);

 if(roll < chance){
     balance += bet*2;
     alert("Выигрыш!");
 } else {
     alert("Проигрыш");
 }

 updateBal();
}

// ===== МИНЫ =====
let minesArr = [];
let opened = 0;

function minesUI(){
 document.getElementById('game').innerHTML = `
 <h2>💣 Мины</h2>
 Ставка <input id="bet"><br>
 Мин (1-24) <input id="mines"><br>
 <button onclick="startMines()">Начать</button>
 <div class="grid" id="grid"></div>
 `;
}

function startMines(){
 let bet = Number(document.getElementById('bet').value);
 let minesCount = Number(document.getElementById('mines').value);

 if(bet > balance) return alert("Нет денег");

 balance -= bet;
 opened = 0;

 minesArr = Array(25).fill(0);

 for(let i=0;i<minesCount;i++){
     let r;
     do { r = Math.floor(Math.random()*25); }
     while(minesArr[r]===1);
     minesArr[r]=1;
 }

 const grid = document.getElementById('grid');
 grid.innerHTML = "";

 for(let i=0;i<25;i++){
     const cell = document.createElement("div");
     cell.className="cell";
     cell.onclick = ()=>clickMine(i, cell, bet);
     grid.appendChild(cell);
 }
}

function clickMine(i, el, bet){
 if(minesArr[i]===1){
     el.innerHTML="💣";
     alert("Проигрыш");
     return;
 }

 el.innerHTML="✅";
 opened++;

 let win = bet * (1 + opened*0.2);
 balance += win;

 updateBal();
}

// ===== КРАШ =====
function crashUI(){
 document.getElementById('game').innerHTML = `
 <h2>🚀 Краш</h2>
 Ставка <input id="bet"><br>
 <button onclick="playCrash()">Играть</button>
 `;
}

function playCrash(){
 let bet = Number(document.getElementById('bet').value);

 if(bet > balance) return alert("Нет денег");

 balance -= bet;

 let x = 1;
 let interval = setInterval(()=>{
     x += 0.1;

     document.getElementById('game').innerHTML = `
     <h2>🚀 x${x.toFixed(2)}</h2>
     <button onclick="cashout(${bet}, ${x}, this)">Забрать</button>
     `;

     if(Math.random() < 0.05){
         clearInterval(interval);
         alert("💥 Сгорел");
     }

 },100);
}

function cashout(bet, x){
 balance += bet * x;
 updateBal();
 alert("Ты забрал x"+x.toFixed(2));
}

// ===== НАВИГАЦИЯ =====
function openGame(name){
 if(name==='dice') diceUI();
 if(name==='mines') minesUI();
 if(name==='crash') crashUI();
}
</script>

</body>
</html>
