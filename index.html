<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENUKOW — Игры Онлайн</title>

    <style>
        :root {
            --bg-dark: #0a0e17;
            --card-bg: #141a26;
            --accent-blue: #007bff;
            --text-white: #ffffff;
            --text-gray: #8b949e;
            --green-badge: #00e676;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding-bottom: 70px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(10, 14, 23, 0.95);
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #00a2ff;
        }

        .btn-login {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .main-content {
            padding: 20px 16px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        /* MODAL */
        #authModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #161b28;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 320px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">MENUKOW</div>
    <button class="btn-login" id="loginBtn" onclick="openAuth()">➔ Войти</button>
</header>

<div class="main-content">
    <div class="game-card">🃏 Блэкджек</div>
    <div class="game-card">🚀 Краш</div>
    <div class="game-card">💣 Мины</div>
</div>

<!-- МОДАЛКА -->
<div id="authModal">
    <div class="modal-content">
        <h2>Авторизация</h2>
        <p style="color:gray;">Войдите через Telegram</p>

        <!-- ✅ ПРАВИЛЬНАЯ КНОПКА TELEGRAM -->
        <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="MenukowBot"
            data-size="large"
            data-onauth="onTelegramAuth(user)"
            data-request-access="write">
        </script>

        <br><br>
        <button onclick="closeAuth()">Отмена</button>
    </div>
</div>

<script>
    function openAuth() {
        document.getElementById('authModal').style.display = 'flex';
    }

    function closeAuth() {
        document.getElementById('authModal').style.display = 'none';
    }

    function onTelegramAuth(user) {
        closeAuth();

        const loginBtn = document.getElementById('loginBtn');
        loginBtn.innerHTML = "👤 " + user.first_name;

        localStorage.setItem('isLogged', 'true');
        localStorage.setItem('userName', user.first_name);

        alert('Привет, ' + user.first_name);
    }

    window.onload = function() {
        if (localStorage.getItem('isLogged') === 'true') {
            const name = localStorage.getItem('userName');
            document.getElementById('loginBtn').innerHTML = "👤 " + name;
        }
    }
</script>

</body>
</html>
